# Production profile
spring.datasource.url=${PROD_DB_URL:}
spring.datasource.username=${PROD_DB_USERNAME:}
spring.datasource.password=${PROD_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS
app.security.cors.allowed-origins=${PROD_CORS_ALLOWED_ORIGINS:}

# Admin bootstrap (recommended only on first deployment)
app.bootstrap.admin.enabled=${PROD_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.full-name=${PROD_BOOTSTRAP_ADMIN_FULL_NAME:Administrator}
app.bootstrap.admin.email=${PROD_BOOTSTRAP_ADMIN_EMAIL:admin@acare.local}
app.bootstrap.admin.phone=${PROD_BOOTSTRAP_ADMIN_PHONE:037933066668}
app.bootstrap.admin.id-number=${PROD_BOOTSTRAP_ADMIN_ID_NUMBER:034934354}
app.bootstrap.admin.address=${PROD_BOOTSTRAP_ADMIN_ADDRESS:Hoho}
app.bootstrap.admin.password=${PROD_BOOTSTRAP_ADMIN_PASSWORD:admin}

# Strongly recommended in production
logging.level.com.acare.backend=INFO
