spring.application.name=Backend
server.port=${PORT:}

# Profile selection: use -Dspring.profiles.active=prod when deploying
spring.profiles.active=prod

# Shared JPA defaults
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# JWT secret for HS256 (must be at least 32 chars)
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:Fu/zDHWjCC/QTj/aVHfTg2wThk3fIZhEUCq4Im2gnyM=}
app.security.jwt.expiration-minutes=120

# Logging
logging.file.name=logs/backend.log
logging.level.root=INFO
logging.level.com.acare.backend=DEBUG
