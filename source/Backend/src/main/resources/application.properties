spring.application.name=Backend
server.port=8080

# Profile selection: use -Dspring.profiles.active=prod when deploying
spring.profiles.active=dev

# Shared JPA defaults
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT secret for HS256 (must be at least 32 chars)
app.security.jwt.secret=replace-this-with-a-strong-32-char-secret-key
app.security.jwt.expiration-minutes=120

# Logging
logging.file.name=logs/backend.log
logging.level.root=INFO
logging.level.com.acare.backend=DEBUG
